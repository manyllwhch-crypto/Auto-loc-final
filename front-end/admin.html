<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/admin.css">

<style>body{
    background:#f5f7fa;
    font-family:'Inter',sans-serif;
}

/* ============================= */

.admin-container{

    max-width:1300px;

    margin:140px auto 80px;

    padding:0 25px;
}

.admin-title{

    font-size:42px;

    margin-bottom:40px;

    font-weight:700;
}

/* ============================= */

.admin-actions{

    display:flex;

    gap:20px;

    margin-bottom:45px;

    flex-wrap:wrap;
}

.admin-actions button{

    background:#1a73e8;

    color:white;

    border:none;

    border-radius:12px;

    padding:14px 24px;

    cursor:pointer;

    font-weight:600;

    transition:.3s;
}

.admin-actions button:hover{

    transform:translateY(-3px);

    background:#1558b0;
}

/* ============================= */

.card{

    background:white;

    border-radius:18px;

    padding:25px;

    margin-bottom:25px;

    box-shadow:0 10px 30px rgba(0,0,0,.08);

    transition:.3s;
}

.card:hover{

    transform:translateY(-6px);

    box-shadow:0 18px 35px rgba(0,0,0,.12);
}

.card h2{

    margin-bottom:10px;
}

.card h3{

    color:#1a73e8;

    margin-bottom:12px;
}

.card hr{

    margin:20px 0;

    border:none;

    border-top:1px solid #eee;
}

/* ============================= */

.card-actions{

    display:flex;

    gap:12px;

    margin-top:20px;
}

.edit,
.delete,
.save,
.cancel{

    border:none;

    border-radius:10px;

    padding:10px 18px;

    cursor:pointer;

    font-weight:600;

    transition:.3s;
}

.edit{

    background:#f59e0b;

    color:white;
}

.edit:hover{

    background:#d97706;
}

.delete{

    background:#dc2626;

    color:white;
}

.delete:hover{

    background:#b91c1c;
}

.save{

    background:#16a34a;

    color:white;
}

.save:hover{

    background:#15803d;
}

.cancel{

    background:#64748b;

    color:white;
}

.cancel:hover{

    background:#475569;
}

/* ============================= */

.edit-form{

    display:none;

    margin-top:25px;

    padding:25px;

    border-radius:14px;

    background:#f8fafc;
}

.edit-form label{

    display:block;

    margin-bottom:8px;

    font-weight:600;
}

.edit-form input,
.edit-form select{

    width:100%;

    padding:13px;

    margin-bottom:18px;

    border-radius:10px;

    border:1px solid #ddd;

    font-family:inherit;

    transition:.3s;
}

.edit-form input:focus,
.edit-form select:focus{

    outline:none;

    border-color:#1a73e8;
}

/* ============================= */
/* DARK MODE */
/* ============================= */

body.dark-mode{

    background:#000;
}

body.dark-mode .card{

    background:#111;
}

body.dark-mode .edit-form{

    background:#1b1b1b;
}

body.dark-mode .card h2,
body.dark-mode .card h3,
body.dark-mode label{

    color:white;
}

body.dark-mode p{

    color:#d5d5d5;
}

body.dark-mode input,
body.dark-mode select{

    background:#222;

    color:white;

    border:1px solid #333;
}

/* ============================= */

@media(max-width:768px){

.admin-container{

margin-top:120px;

padding:20px;
}

.admin-title{

font-size:32px;
}

.card-actions{

flex-direction:column;
}

.admin-actions{

flex-direction:column;
}

.admin-actions button{

width:100%;
}

}
</style>
</head>

<body>

<header class="navbar scrolled">
    <a href="index.html" class="logo">ADMIN PANEL</a>
    <button id="logout" class="logout-btn">Déconnexion</button>
</header>

<div class="admin-container fade-in visible">

    <h1 class="admin-title">
    Panel administrateur
</h1>

    <div class="admin-actions">
        <button onclick="showReservations()">Gérer les réservations</button>
        <button onclick="showUsers()">Gérer les comptes</button>
    </div>

    <h2 id="section-title">Gestion des réservations</h2>

    <div id="content"></div>

</div>

<script>
const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

if (!token) {
    window.location.href = "login.html";
}

if (role !== "admin") {
    alert("Accès refusé");
    window.location.href = "dashboard.html";
}

const content = document.getElementById("content");
const sectionTitle = document.getElementById("section-title");

function showReservations() {
    sectionTitle.textContent = "Gestion des réservations";
    loadReservations();
}

function showUsers() {
    sectionTitle.textContent = "Gestion des comptes";
    loadUsers();
}

async function loadReservations() {
    try {
        const response = await fetch(
            "/api/reservations/admin",
            {
                headers: {
                    Authorization: "Bearer " + token
                }
            }
        );

        const reservations = await response.json();

        content.innerHTML = "";

        if (!Array.isArray(reservations) || reservations.length === 0) {
            content.innerHTML = "<p>Aucune réservation.</p>";
            return;
        }

        reservations.forEach(r => {
            content.innerHTML += `
                <div class="card">
                    <h3>${r.fullname} (${r.email})</h3>

                    <hr>

                    <h2>${r.brand} ${r.model}</h2>

                    <p><b>Départ :</b> ${r.start_date}</p>
                    <p><b>Retour :</b> ${r.end_date}</p>
                    <p><b>Lieu :</b> ${r.pickup_location || "Non renseigné"}</p>
                    <p><b>Prix :</b> ${r.total_price}€</p>
                    <p><b>Statut :</b> ${r.status}</p>

                    <div class="card-actions">
                        <button class="edit" onclick="toggleEditForm(${r.id})">
                            Éditer
                        </button>

                        <button class="delete" onclick="deleteReservation(${r.id})">
                            Supprimer
                        </button>
                    </div>

                    <div class="edit-form" id="edit-form-${r.id}">
                        <label>Date de départ</label>
                        <input type="date" id="start-${r.id}" value="${formatDate(r.start_date)}">

                        <label>Date de retour</label>
                        <input type="date" id="end-${r.id}" value="${formatDate(r.end_date)}">

                        <label>Lieu de prise en charge</label>
                        <input type="text" id="location-${r.id}" value="${r.pickup_location || ""}">

                        <label>Statut</label>
                        <select id="status-${r.id}">
                            <option value="pending" ${r.status === "pending" ? "selected" : ""}>En attente</option>
                            <option value="confirmed" ${r.status === "confirmed" ? "selected" : ""}>Confirmée</option>
                            <option value="cancelled" ${r.status === "cancelled" ? "selected" : ""}>Annulée</option>
                        </select>

                        <div class="card-actions">
                            <button class="save" onclick="updateReservation(${r.id})">
                                Enregistrer
                            </button>

                            <button class="cancel" onclick="toggleEditForm(${r.id})">
                                Annuler
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });

    } catch (err) {
        console.error(err);
        content.innerHTML = "<p>Erreur lors du chargement des réservations.</p>";
    }
}

function toggleEditForm(id) {
    const form = document.getElementById("edit-form-" + id);

    if (!form) return;

    form.style.display = form.style.display === "block" ? "none" : "block";
}

async function updateReservation(id) {
    const start_date = document.getElementById("start-" + id).value;
    const end_date = document.getElementById("end-" + id).value;
    const pickup_location = document.getElementById("location-" + id).value;
    const status = document.getElementById("status-" + id).value;

    if (!start_date || !end_date) {
        alert("Les dates sont obligatoires.");
        return;
    }

    try {
        const response = await fetch(
            "/api/reservations/admin/" + id,
            {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: "Bearer " + token
                },
                body: JSON.stringify({
                    start_date,
                    end_date,
                    pickup_location,
                    status
                })
            }
        );

        const data = await response.json();

        if (!response.ok) {
            alert(data.message || "Erreur lors de la modification.");
            return;
        }

        alert("Réservation modifiée.");
        loadReservations();

    } catch (err) {
        console.error(err);
        alert("Erreur serveur.");
    }
}

async function deleteReservation(id) {
    if (!confirm("Supprimer cette réservation ?")) return;

    await fetch(
        "/api/reservations/admin/" + id,
        {
            method: "DELETE",
            headers: {
                Authorization: "Bearer " + token
            }
        }
    );

    loadReservations();
}
async function loadUsers() {
    try {
        const response = await fetch(
            "/api/auth/admin/users",
            {
                headers: {
                    Authorization: "Bearer " + token
                }
            }
        );

        const users = await response.json();

content.innerHTML = `
    <div class="accounts-header">
        <button class="save create-account-btn" onclick="toggleCreateUserForm()">
            Créer un compte
        </button>
    </div>

<div class="card" id="create-user-card" style="display:none;">
    <div class="edit-form" id="create-user-form" style="display:block;">
            <label>Nom complet</label>
            <input type="text" id="new-fullname">

            <label>Email</label>
            <input type="email" id="new-email">

            <label>Mot de passe</label>
            <input type="password" id="new-password">

            <label>Rôle</label>
            <select id="new-role">
                <option value="user">Client</option>
                <option value="admin">Admin</option>
            </select>

            <div class="card-actions">
                <button class="save" onclick="createUser()">
                    Valider
                </button>

                <button class="cancel" onclick="toggleCreateUserForm()">
                    Annuler
                </button>
            </div>
        </div>
    </div>
`;

        if (!Array.isArray(users) || users.length === 0) {
            content.innerHTML += "<p>Aucun compte utilisateur.</p>";
            return;
        }

        users.forEach(user => {
            content.innerHTML += `
                <div class="card">
                    <h3>${user.fullname}</h3>

                    <p><b>Email :</b> ${user.email}</p>
                    <p><b>Rôle :</b> ${user.role}</p>

                    ${
                        Number(user.id) === getCurrentUserId()
                        ? `<p><b>Compte actuellement connecté</b></p>`
                        : `<button class="delete" onclick="deleteUser(${user.id})">
                                Supprimer le compte
                           </button>`
                    }
                </div>
            `;
        });

    } catch (err) {
        console.error(err);
        content.innerHTML = "<p>Erreur lors du chargement des comptes.</p>";
    }
}

function getCurrentUserId() {
    return Number(localStorage.getItem("userId"));
}

function toggleCreateUserForm() {
    const card = document.getElementById("create-user-card");

    if (!card) return;

    card.style.display = card.style.display === "none" ? "block" : "none";
}

async function createUser() {
    const fullname = document.getElementById("new-fullname").value.trim();
    const email = document.getElementById("new-email").value.trim();
    const password = document.getElementById("new-password").value.trim();
    const role = document.getElementById("new-role").value;

    if (!fullname || !email || !password || !role) {
        alert("Veuillez remplir tous les champs.");
        return;
    }

    try {
        const response = await fetch(
            "/api/auth/admin/users",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: "Bearer " + token
                },
                body: JSON.stringify({
                    fullname,
                    email,
                    password,
                    role
                })
            }
        );

        const data = await response.json();

        if (!response.ok) {
            alert(data.message || "Erreur création compte");
            return;
        }

        alert("Compte créé.");
        loadUsers();

    } catch (err) {
        console.error(err);
        alert("Erreur serveur lors de la création du compte.");
    }
}

async function deleteUser(id) {
    if (Number(id) === getCurrentUserId()) {
        alert("Vous ne pouvez pas supprimer votre propre compte.");
        return;
    }

    if (!confirm("Supprimer ce compte utilisateur ?")) return;

    try {
        const response = await fetch(
            "/api/auth/admin/users/" + id,
            {
                method: "DELETE",
                headers: {
                    Authorization: "Bearer " + token
                }
            }
        );

        const data = await response.json();

        if (!response.ok) {
            alert(data.message || "Erreur suppression compte");
            return;
        }

        loadUsers();

    } catch (err) {
        console.error(err);
        alert("Erreur serveur lors de la suppression.");
    }
}

function formatDate(dateString) {
    if (!dateString) return "";

    // Si la date arrive sous forme ISO : 2026-04-07T00:00:00.000Z
    if (typeof dateString === "string" && dateString.includes("T")) {
        return dateString.split("T")[0];
    }

    // Si la date arrive déjà au bon format : 2026-04-07
    if (typeof dateString === "string") {
        return dateString.substring(0, 10);
    }

    return "";
}

document.getElementById("logout").addEventListener("click", () => {
    localStorage.clear();
    window.location.href = "index.html";
});

loadReservations();
</script>

</body>
</html>
